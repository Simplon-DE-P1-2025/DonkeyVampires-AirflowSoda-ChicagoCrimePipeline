dataset: duckdb/chicago_crime

# ============================================================
# FIRST CHECK — données JSON brutes (pré-transformation)
# Règle : valider uniquement la PRÉSENCE des champs critiques.
# Tous les champs sont varchar (l'API retourne tout en string).
# Les checks de types, plages et doublons sont dans secondcheck.
# ============================================================

columns:

  # --- Identifiants ---
  - name: id
    data_type: varchar
    checks:
      - missing:
      - duplicate:         # détection des doublons dès l'ingestion

  - name: case_number
    data_type: varchar
    checks:
      - missing:

  # --- Dates (strings brutes ex: "2026-03-03T00:00:00.000") ---
  - name: date
    data_type: varchar
    checks:
      - missing:

  - name: year
    data_type: varchar
    checks:
      - missing:

  - name: updated_on
    data_type: varchar
    checks:
      - missing:

  # --- Localisation ---
  - name: block
    data_type: varchar
    checks:
      - missing:

  - name: location_description
    data_type: varchar

  # --- Codes administratifs (strings brutes ex: "0834") ---
  - name: beat
    data_type: varchar
    checks:
      - missing:

  - name: district
    data_type: varchar
    checks:
      - missing:

  - name: ward
    data_type: varchar
    checks:
      - missing:

  - name: community_area
    data_type: varchar
    checks:
      - missing:

  # --- Classification du crime ---
  - name: iucr
    data_type: varchar
    checks:
      - missing:

  - name: primary_type
    data_type: varchar
    checks:
      - missing:

  - name: description
    data_type: varchar
    checks:
      - missing:

  - name: fbi_code
    data_type: varchar
    checks:
      - missing:

  # --- Booléens (strings brutes "true"/"false") ---
  - name: arrest
    data_type: varchar
    checks:
      - missing:

  - name: domestic
    data_type: varchar
    checks:
      - missing:

  # --- Coordonnées (strings brutes, présence optionnelle) ---
  - name: x_coordinate
    data_type: varchar

  - name: y_coordinate
    data_type: varchar

  - name: latitude
    data_type: varchar

  - name: longitude
    data_type: varchar
